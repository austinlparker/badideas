<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!--
  Welcome to the loader. The page you are trying to visit is a PHP script.
  Before it can run, your browser must:

    1. download MySQL 5.7's embedded server (compiled from C/C++ to WASM)
    2. boot it
    3. download a mysqldump file from github.io
    4. replay it into the server, one statement at a time
    5. download a PHP interpreter           (compiled from C to WASM)
    6. boot that too
    7. download index.php as plain text
    8. execute it, letting PHP query MySQL over a JavaScript bridge
    9. finally, paint

  Nothing is streamed. Nothing is cached beyond what GitHub Pages insists on.
  Progress is reported on the page and in the developer console, where all
  honest progress eventually ends up.

  Time To First Contentful Paint is measured in minutes, as requested.
-->
<title>connecting to database...</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💾</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: only light; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #000080;
    color: #000;
    font: 16px/1.5 "Courier New", monospace;
  }
  #boot {
    width: min(42rem, calc(100% - 3rem));
    border: 4px ridge #c0c0c0;
    background: #000;
    color: #fff;
    color-scheme: dark;
    box-shadow: 12px 12px 0 #000040;
  }
  #boot h1 {
    margin: 0;
    padding: .35rem .75rem;
    background: #c0c0c0;
    color: #000080;
    font: bold 1rem Verdana, sans-serif;
  }
  #boot-copy { padding: 1.25rem; }
  #boot-status { color: #00ff00; }
  #boot-status::before { content: "> "; }
  #boot-note { color: #00ffff; font-size: .85rem; }
  #fatal-error {
    width: min(42rem, calc(100% - 3rem));
    box-sizing: border-box;
    padding: 2rem;
    border: 4px ridge #c0c0c0;
    background: #000;
    color: #fff;
    color-scheme: dark;
    box-shadow: 12px 12px 0 #000040;
  }
  #fatal-error h1 { margin-top: 0; color: #ffff00; }
  #fatal-error pre {
    color: #fff;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  noscript { color: #fff; }
  input { background: #fff; color: #000; }
</style>
</head>
<body>
<main id="boot" role="status" aria-live="polite">
  <h1>connecting to database...</h1>
  <div id="boot-copy">
    <div id="boot-status">starting the browser-side server stack...</div>
    <p id="boot-note">
      This page boots MySQL and PHP inside your browser before it can paint the
      site. A cold start can take a few minutes. The first visit also reloads
      once to enable WebAssembly threads. Keep this tab open; regrettably, it
      is working.
    </p>
  </div>
</main>
<noscript>This website requires JavaScript to run PHP. Read that again.</noscript>
<script type="module">
const t0 = Date.now();
const sleep = ms => new Promise(r => setTimeout(r, ms));
const stamp = () => ((Date.now() - t0) / 1000).toFixed(1).padStart(7) + 's';
const say = msg => console.log(`%c[${stamp()}]%c ${msg}`, 'color:#0f0;background:#000', '');
const showStatus = msg => {
  document.title = msg;
  const status = document.querySelector('#boot-status');
  if (status) status.textContent = msg;
};
const phase = msg => {
  showStatus(msg);
  say(msg.toUpperCase());
};

window.__elapsedSeconds = () => ((Date.now() - t0) / 1000).toFixed(1);

console.log(`%c
  ██████╗  █████╗ ██████╗     ██╗██████╗ ███████╗ █████╗ ███████╗
  ██╔══██╗██╔══██╗██╔══██╗    ██║██╔══██╗██╔════╝██╔══██╗██╔════╝
  ██████╔╝███████║██║  ██║    ██║██║  ██║█████╗  ███████║███████╗
  ██╔══██╗██╔══██║██║  ██║    ██║██║  ██║██╔══╝  ██╔══██║╚════██║
  ██████╔╝██║  ██║██████╔╝    ██║██████╔╝███████╗██║  ██║███████║
  ╚═════╝ ╚═╝  ╚═╝╚═════╝     ╚═╝╚═════╝ ╚══════╝╚═╝  ╚═╝╚══════╝
  PHP (wasm) -> MySQL (wasm) -> a dump from github.io -> your RAM
`, 'color:#f0f');

let php = null;
let phpSource = null;
let mysql = null;
const outputChunks = [];

async function ensureCrossOriginIsolation() {
  if (globalThis.crossOriginIsolated) {
    sessionStorage.removeItem('coi-reload');
    return;
  }
  if (!('serviceWorker' in navigator)) {
    throw new Error('MySQL Wasm needs cross-origin isolation for pthreads, but this browser has no service workers');
  }
  if (sessionStorage.getItem('coi-reload') === '1') {
    throw new Error('The page reloaded but is still not cross-origin isolated (COOP/COEP headers are missing)');
  }

  say('installing the COOP/COEP service worker required by WebAssembly pthreads');
  await navigator.serviceWorker.register('./coi-serviceworker.js');
  await navigator.serviceWorker.ready;
  sessionStorage.setItem('coi-reload', '1');
  location.reload();
  await new Promise(() => {});
}

async function fetchPhpFile(url, attempts = 5) {
  let lastError;
  for (let attempt = 1; attempt <= attempts; attempt++) {
    let response;
    try {
      response = await fetch(url);
    } catch (error) {
      lastError = error;
    }
    if (response) {
      if (response.ok) return response;
      lastError = new Error(`${url}: HTTP ${response.status}`);
      if (![408, 429, 500, 502, 503, 504].includes(response.status)) throw lastError;
    }

    if (attempt < attempts) {
      const delay = 250 * (2 ** (attempt - 1));
      say(`${url} failed (${lastError.message}); retrying in ${delay}ms`);
      await sleep(delay);
    }
  }
  throw lastError;
}

async function preloadPhpFiles(fs, files, concurrency = 8) {
  const directories = new Set(files.map(file => file.parent));
  for (const directory of directories) {
    let current = '';
    for (const segment of directory.split('/')) {
      if (!segment) continue;
      current += '/' + segment;
      if (!fs.analyzePath(current).exists) fs.mkdir(current);
    }
  }

  let cursor = 0;
  let completed = 0;
  const worker = async () => {
    while (cursor < files.length) {
      const file = files[cursor++];
      const response = await fetchPhpFile(file.url);
      const target = file.parent === '/' ? `/${file.name}` : `${file.parent}/${file.name}`;
      fs.writeFile(target, new Uint8Array(await response.arrayBuffer()));
      completed++;
      if (completed % 250 === 0 || completed === files.length) {
        showStatus(`preloading real WordPress core (${completed}/${files.length})...`);
      }
    }
  };

  await Promise.all(Array.from(
    { length: Math.min(concurrency, files.length) },
    () => worker(),
  ));
}

async function main() {
  await ensureCrossOriginIsolation();

  phase('booting MySQL 5.7.44 in WebAssembly...');
  say('importing Oracle MySQL 5.7.44\'s embedded server library, compiled from C/C++ with Emscripten');
  const { default: createMysqlModule } = await import('./mysql-wasm/mysql.mjs');
  const mysqlBase = new URL('./mysql-wasm/', location.href);
  phase('loading the MySQL WebAssembly runtime...');
  mysql = await createMysqlModule({
    locateFile: name => new URL(name, mysqlBase).href,
    monitorRunDependencies: remaining => {
      if (remaining) phase(`loading the MySQL runtime (${remaining} dependencies remaining)...`);
    },
    print: message => console.log('[mysql stdout]', message),
    printErr: message => console.error('[mysql stderr]', message),
  });

  const mysqlState = mysql.cwrap('mysql_wasm_state', 'number', []);
  const mysqlError = mysql.cwrap('mysql_wasm_error', 'string', []);
  const queryMysql = mysql.cwrap('mysql_wasm_query', 'string', ['string']);
  phase('starting the embedded MySQL server on a background thread...');
  const initStarted = Date.now();
  let initState = mysqlState();
  let displayedSecond = -1;
  while (initState === 0 || initState === 1) {
    const elapsed = Math.floor((Date.now() - initStarted) / 1000);
    if (elapsed !== displayedSecond) {
      displayedSecond = elapsed;
      showStatus(`starting the embedded MySQL server in the background (${elapsed}s)...`);
    }
    await sleep(50);
    initState = mysqlState();
  }
  if (initState !== 2) {
    let detail = mysqlError() || `unexpected initialization state ${initState}`;
    try { detail = JSON.parse(detail).error || detail; } catch (_) {}
    throw new Error('MySQL initialization failed: ' + detail);
  }
  globalThis.mysqlQuery = queryMysql;
  globalThis.mysqldReady = true;
  say('MySQL is up. This is libmysqld, so it has no TCP socket and lives only in this tab\'s memory.');

  phase('replaying database dump...');
  say('pulling prebuilt dump from ' + new URL('dump.sql', location.href).href
      + (location.hostname.endsWith('github.io') ? ' (authentic github.io provenance)' : ' (locally — imagine it is github.io)'));
  const dumpResp = await fetch('dump.sql');
  if (!dumpResp.ok) throw new Error(`dump.sql: HTTP ${dumpResp.status}`);
  const dump = await dumpResp.text();

  const statements = dump.split(/;\s*\r?\n/)
    .map(chunk => chunk.split('\n').filter(l => !l.trim().startsWith('--')).join('\n').trim())
    .filter(s => s.length > 0);

  say(`replaying ${statements.length} SQL statements, one at a time, like it's a ceremony`);
  for (let i = 0; i < statements.length; i++) {
    const res = JSON.parse(globalThis.mysqlQuery(statements[i]));
    if (res.error) throw new Error(`dump replay failed at statement ${i + 1}: ${res.error}\n${statements[i]}`);
    if ((i + 1) % 25 === 0) say(`  ${i + 1}/${statements.length} statements replayed`);
    await sleep(0); // yield to the event loop out of politeness, and slowness
  }
  say('dump replayed. the database now exists. it will die when you close the tab.');

  phase('booting PHP interpreter...');
  say('importing php-wasm (a PHP interpreter, for your browser, which already had JavaScript)');
  phase('preloading real WordPress core into PHP-WASM FS...');
  const manifestResp = await fetch('wordpress-manifest.json');
  if (!manifestResp.ok) throw new Error(`wordpress-manifest.json: HTTP ${manifestResp.status}`);
  const wordpressFiles = await manifestResp.json();
  say(`preloading ${wordpressFiles.length} WordPress files. yes, actual WordPress. no, this is not normal.`);
  const { PhpWeb } = await import('./php-wasm/PhpWeb.mjs');
  php = new PhpWeb();
  php.addEventListener('output', e => outputChunks.push(...e.detail));
  php.addEventListener('error', e => console.error('[php stderr]', e.detail.join('')));
  const phpBinary = await php.binary;
  await preloadPhpFiles(phpBinary.FS, wordpressFiles);
  say('PHP is up. two runtimes and a database are now sharing one browser tab.');

  say('fetching index.php as plain text, the way no webserver would ever allow');
  const phpResp = await fetch('index.php');
  if (!phpResp.ok) throw new Error(`index.php: HTTP ${phpResp.status}`);
  phpSource = await phpResp.text();

  phase('executing index.php...');
  await renderPhp();
  document.title = "Austin's Real Browser WordPress";
  phase(`first contentful paint at ${stamp().trim()} — a new record (either direction)`);
  document.title = "Austin's Real Browser WordPress";
}

async function renderPhp() {
  outputChunks.length = 0;
  const exitCode = await php.run(phpSource);
  await replaceDocumentWithPhpOutput(exitCode);
}

async function replaceDocumentWithPhpOutput(exitCode) {
  await sleep(100); // let trailing output flush
  if (!outputChunks.length) throw new Error(`PHP produced no output (exit code ${exitCode})`);
  document.body.innerHTML = outputChunks.join('');
  wireWordPressForms();
}

// The WordPress comment form submits through actual WordPress APIs, then re-runs
// the front controller. Server-side rendering, client-side, on demand.
window.__submitWordPressComment = function (form) {
  const esc = s => s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/[\r\n;]/g, ' ');
  const author = esc((form.author?.value || '').trim() || 'anonymous coward');
  const email = esc((form.email?.value || '').trim() || 'nobody@example.invalid');
  const content = esc((form.comment?.value || '').trim());
  const postId = Number(form.comment_post_ID?.value || 1);
  if (!content) { alert('WordPress declined to publish an empty comment. rude but fair.'); return false; }
  say('submitting through wp_new_comment(), inside PHP-WASM, against MySQL-WASM...');
  const code = `<?php
chdir('/wordpress');
$_SERVER['REMOTE_ADDR'] = '127.0.0.1';
require_once '/wp-config.php';
$comment_id = wp_new_comment(array(
  'comment_post_ID' => ${postId},
  'comment_author' => '${author}',
  'comment_author_email' => '${email}',
  'comment_author_url' => '',
  'comment_author_IP' => '127.0.0.1',
  'comment_agent' => 'badideas browser WordPress',
  'comment_content' => '${content}',
  'comment_type' => 'comment',
  'comment_approved' => 1,
), true);
if (is_wp_error($comment_id) && 'comment_duplicate' !== $comment_id->get_error_code()) {
  throw new RuntimeException($comment_id->get_error_message());
}
?>`;
  outputChunks.length = 0;
  (async () => {
    await php.run(code);
    // php-wasm keeps one PHP process alive across run() calls. Refresh it so
    // WordPress' front-controller guards and request globals start clean while
    // the in-memory MySQL database (including the new comment) stays put.
    await sleep(250);
    await php.refresh();
    await renderPhp();
  })().catch(fail);
  return false;
};

function wireWordPressForms() {
  document.querySelectorAll('form[action*="wp-comments-post.php"]').forEach(form => {
    form.onsubmit = () => window.__submitWordPressComment(form);
  });
}


function fail(err) {
  console.error(err);
  document.body.innerHTML =
    '<main id="fatal-error" role="alert"><h1>500 Internal Browser Error</h1>' +
    '<p>The website that runs entirely in your browser has crashed, entirely in your browser.</p>' +
    '<pre>' + String(err && err.message || err).replace(/</g, '&lt;') + '</pre>' +
    '<p>See the console for the full confession.</p></main>';
  document.title = '500 Internal Browser Error';
}

main().catch(fail);
</script>
</body>
</html>
