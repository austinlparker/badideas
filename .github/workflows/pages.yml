name: Deploy the monument to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: .cache/badideas-mysql-wasm
          key: mysql-wasm-${{ runner.os }}-${{ hashFiles('mysql-wasm/**') }}

      - name: Verify the checked-in database dump
        run: |
          python3 tools/generate_dump.py
          git diff --exit-code -- site/dump.sql

      - name: Compile Oracle MySQL 5.7's embedded server for the browser
        run: ./mysql-wasm/build.sh

      - name: Vendor a PHP interpreter for the browser (so is this one)
        run: ./tools/vendor-php-wasm.sh

      - name: Inspect the payload we are about to inflict
        run: du -sh site site/* | sort -h

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
