name: Deploy the monument to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - id: mysql-cache
        uses: actions/cache/restore@v6
        with:
          path: .cache/badideas-mysql-wasm
          key: mysql-wasm-${{ runner.os }}-${{ hashFiles('mysql-wasm/**') }}

      - name: Verify the checked-in database dump
        run: |
          python3 tools/generate_dump.py
          git diff --exit-code -- site/dump.sql

      - name: Compile Oracle MySQL 5.7's embedded server for the browser
        run: ./mysql-wasm/build.sh

      - name: Save the MySQL build cache before browser testing
        if: steps.mysql-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .cache/badideas-mysql-wasm
          key: mysql-wasm-${{ runner.os }}-${{ hashFiles('mysql-wasm/**') }}

      - name: Vendor a PHP interpreter for the browser (so is this one)
        run: ./tools/vendor-php-wasm.sh

      - name: Vendor actual WordPress core for the browser
        run: ./tools/vendor-wordpress.sh

      - name: Boot MySQL and PHP in a real browser
        timeout-minutes: 5
        run: |
          ./tools/serve.py --port 8000 >"$RUNNER_TEMP/site-server.log" 2>&1 &
          server_pid=$!

          google-chrome \
            --headless=new \
            --disable-dev-shm-usage \
            --disable-extensions \
            --disable-gpu \
            --no-first-run \
            --remote-debugging-port=9227 \
            --user-data-dir="$RUNNER_TEMP/badideas-chrome" \
            'http://127.0.0.1:8000/' \
            >"$RUNNER_TEMP/chrome.log" 2>&1 &
          chrome_pid=$!

          # Invoked indirectly by the EXIT trap.
          # shellcheck disable=SC2329
          cleanup() {
            kill "$chrome_pid" "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          if ! node tools/browser-smoke.mjs \
            http://127.0.0.1:9227 \
            http://127.0.0.1:8000/ \
            "Austin's Real Browser WordPress" \
            180000
          then
            cat "$RUNNER_TEMP/site-server.log"
            cat "$RUNNER_TEMP/chrome.log"
            exit 1
          fi

      - name: Inspect the payload we are about to inflict
        run: du -sh site site/* | sort -h

      - uses: actions/configure-pages@v6
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify the deployed Pages payload
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          base="${PAGE_URL%/}/"
          index="$RUNNER_TEMP/pages-index.html"

          curl --fail --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 5 \
            --output "$index" "$base"
          grep --fixed-strings --quiet 'id="boot-status"' "$index"

          for asset in \
            coi-serviceworker.js \
            dump.sql \
            index.php \
            mysql-wasm/mysql.mjs \
            mysql-wasm/mysql.wasm \
            php-wasm/PhpWeb.mjs \
            wordpress-manifest.json \
            wordpress/index.php \
            wordpress/wp-settings.php \
            wp-content/db.php \
            wp-content/themes/badideas/index.php
          do
            curl --fail --silent --show-error \
              --retry 5 --retry-all-errors --retry-delay 5 \
              --output /dev/null "${base}${asset}"
          done
